<!DOCTYPE html>
<html>
<head>
    <title>PerfMon Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>PerfMon Analyzer Tool</h2>

    <p>
        Upload PerfMon CSV file (Convert using: relog input.blg -f csv -o output.csv)
    </p>

    <input type="file" id="fileInput" />

    <br><br>

    <button onclick="exportPDF()">Download Report (PDF)</button>

    <hr>

    <h3>Capture Details</h3>

    <p id="server"><b>Server:</b> -</p>
    <p id="start"><b>Start:</b> -</p>
    <p id="stop"><b>Stop:</b> -</p>
    <p id="duration"><b>Duration:</b> -</p>

    <hr>

    <div id="output"></div>

    <hr>

    <div id="charts"></div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Your Script -->
    <script src="script.js"></script>

</body>
</html>
